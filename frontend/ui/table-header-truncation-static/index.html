<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table Header Truncation Check</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; background: #fff; }
      .wrap { padding: 16px; }
      .card { border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 12px; }
      .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
      .chip { background: #f5f5f5; border-radius: 999px; padding: 2px 10px; font-size: 12px; }

      .ant-table-wrapper { width: 100%; }
      .ant-table { width: 100%; border-collapse: separate; border-spacing: 0; }
      .ant-table-thead > tr > th,
      .ant-table-tbody > tr > td { border-bottom: 1px solid #eee; }
      .ant-table-thead > tr > th { background: #fafafa; font-weight: 600; }
      .ant-table-cell { padding: 8px 10px; }

      .ant-table-pagination { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
      .ant-pagination { display: flex; gap: 6px; align-items: center; }
      .ant-pagination-item { border: 1px solid #ddd; padding: 2px 8px; border-radius: 6px; font-size: 12px; }

      .bad-scope .ant-table-cell { white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

      :where(.ant-table-wrapper) .ant-table-thead > tr > th.ant-table-cell {
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        line-height: 1.3;
        text-overflow: clip;
        overflow: visible;
      }
      :where(.ant-table-wrapper) .ant-table-thead > tr > th.ant-table-cell .ant-table-column-title {
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      :where(.ant-table-wrapper) .ant-table-pagination {
        flex-wrap: wrap;
      }

      .th-title { display: inline; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="toolbar">
        <span class="chip" id="meta"></span>
        <span class="chip">模拟：表格 + 分页</span>
        <span class="chip">模拟：错误样式（nowrap/ellipsis）</span>
      </div>
      <div class="card bad-scope ant-table-wrapper">
        <table class="ant-table">
          <thead class="ant-table-thead">
            <tr>
              <th class="ant-table-cell"><span class="ant-table-column-title th-title">入住日期（Check-in Date）</span></th>
              <th class="ant-table-cell"><span class="ant-table-column-title th-title">退房日期（Check-out Date）</span></th>
              <th class="ant-table-cell"><span class="ant-table-column-title th-title">超长标题：本列用于验证在小屏幕下是否会被截断或吞字（Header Should Not Be Cut Off）</span></th>
              <th class="ant-table-cell"><span class="ant-table-column-title th-title">金额（Amount AUD）</span></th>
            </tr>
          </thead>
          <tbody class="ant-table-tbody" id="tbody"></tbody>
        </table>
        <div class="ant-table-pagination">
          <div class="ant-pagination">
            <span class="ant-pagination-item">1</span>
            <span class="ant-pagination-item">2</span>
            <span class="ant-pagination-item">3</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(location.search)
        const rows = Number(params.get('rows') || '50')
        const meta = document.getElementById('meta')
        meta.textContent = 'rows=' + rows
        const tbody = document.getElementById('tbody')
        const mk = (i) => {
          const tr = document.createElement('tr')
          tr.innerHTML = '<td class="ant-table-cell">01/01/2026</td>' +
            '<td class="ant-table-cell">02/01/2026</td>' +
            '<td class="ant-table-cell">row_' + i + '_value</td>' +
            '<td class="ant-table-cell">$' + (100 + i) + '.00</td>'
          return tr
        }
        tbody.textContent = ''
        for (let i = 0; i < rows; i++) tbody.appendChild(mk(i + 1))
        window.__TABLE_HEADER_READY__ = true
      })()
    </script>
  </body>
</html>
